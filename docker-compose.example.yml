services:
  litus:
    image: ghcr.io/s-gehring/litus:latest
    ports:
      - "3000:3000"
    environment:
      # Claude Code authentication (required unless mounting ~/.claude below)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # GitHub CLI authentication (required)
      - GH_TOKEN=${GH_TOKEN}
      # Uncomment to change the listen port inside the container
      # - PORT=3000
    volumes:
      # Persistent data (workflow state, config, audit logs)
      - litus-data:/home/litus/.litus
      # Mount your target repository (repeat for multiple repos)
      - ~/projects/my-app:/home/litus/repos/my-app
      # Alternative Claude auth: mount host session instead of ANTHROPIC_API_KEY
      # - ~/.claude:/home/litus/.claude
    restart: unless-stopped

volumes:
  litus-data:
