<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Litus</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <header>
      <a href="/" id="btn-home" class="header-home" title="Home">
        <img src="/logo.svg" alt="Litus" class="header-logo">
        <h1>Litus</h1>
      </a>
      <div id="connection-status" class="status-dot disconnected" title="Disconnected"></div>
      <div class="header-actions">
        <button id="btn-auto-mode" class="btn-header btn-toggle mode-normal" title="Automation level: Manual (pause before merge) / Normal (auto-merge) / Full Auto (auto-answer + auto-merge)"><span class="toggle-icon">▶</span> <span class="toggle-label">Normal</span></button>
        <button id="btn-quick-fix" class="btn-header" title="Quick Fix">Quick Fix</button>
        <button id="btn-new-spec" class="btn-header" title="New Specification">New Specification</button>
        <button id="btn-new-epic" class="btn-header" title="New Epic">New Epic</button>
      </div>
      <a href="/archive" id="btn-archive" class="btn-header btn-archive" title="Archive">Archive<span id="archive-count" class="archive-count-muted">0</span></a>
      <button id="btn-alert-bell" class="btn-alert-bell" title="Alerts" aria-label="Alerts">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="bell-count hidden">0</span>
      </button>
      <button id="btn-config" class="btn-config" title="Configuration">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <div id="app-content">
      <!-- Card strip: compact workflow cards -->
      <div id="card-strip" class="card-strip"></div>

      <!-- Welcome / empty state (shown when no workflow is expanded) -->
      <div id="welcome-area" class="welcome-area">
        <p class="welcome-text">Click "Quick Fix", "New Specification", or "New Epic" to get started</p>
      </div>

      <!-- Detail area: expanded workflow view (hidden until a card is clicked) -->
      <div id="detail-area" class="workflow-window hidden">
        <!-- Status area -->
        <div id="status-area" class="status-area">
          <span class="status-label">Status:</span>
          <span id="workflow-status" class="status-badge idle">idle</span>
          <span id="current-step-label" class="current-step-label hidden"></span>
          <a id="pr-link" class="pr-link hidden" target="_blank" rel="noopener noreferrer"></a>
          <span class="summary-group">
            <span id="workflow-summary" class="summary-text"></span>
            <span id="workflow-step-summary" class="step-summary-text"></span>
            <span id="workflow-flavor" class="flavor-text"></span>
          </span>
        </div>

        <!-- Branch / worktree metadata -->
        <div id="branch-info" class="branch-info hidden"></div>

        <!-- User input / specification text -->
        <div id="user-input" class="user-input hidden"></div>

        <!-- Feedback iteration history (manual-mode merge-pr) -->
        <div id="workflow-feedback-section" class="workflow-feedback-section hidden"></div>

        <!-- Epic feedback history (rendered between user-input and analysis summary) -->
        <div id="epic-feedback-section" class="epic-feedback-section hidden"></div>

        <!-- Specification / description text (collapsible, for longer specs) -->
        <details id="spec-details" class="spec-details hidden">
          <summary class="spec-details-summary">Specification</summary>
          <div id="spec-details-text" class="spec-details-text"></div>
        </details>

        <!-- Detail action buttons (start, force-start) -->
        <div id="detail-actions" class="detail-actions hidden"></div>

        <!-- Workflow-level error banner (reset-failure message, etc.) -->
        <div id="workflow-error-banner" class="workflow-error-banner hidden"></div>

        <!-- Pipeline step indicators -->
        <div id="pipeline-steps" class="pipeline-steps hidden"></div>

        <!-- Active model / effort panel -->
        <div id="active-model-panel" class="active-model-panel"></div>

        <!-- Output area -->
        <div id="output-area" class="output-area">
          <div id="output-log" class="output-log"></div>
        </div>

        <!-- Question panel (overlaps output-area from below) -->
        <div id="question-panel" class="question-panel hidden">
          <div class="question-header">
            <span class="question-label">Agent Question</span>
            <span id="question-confidence" class="confidence-badge"></span>
          </div>
          <div id="question-content" class="question-content"></div>
          <div class="question-actions">
            <textarea id="answer-input" class="answer-input" placeholder="Type your answer..." rows="2"></textarea>
            <div class="question-buttons">
              <button id="btn-submit-answer" class="btn btn-primary">Submit</button>
              <button id="btn-skip-question" class="btn btn-secondary hidden">Skip</button>
            </div>
          </div>
        </div>

        <!-- Feedback panel (manual-mode merge-pr iteration) -->
        <div id="feedback-panel" class="question-panel feedback-panel hidden">
          <div class="question-header">
            <span class="question-label">Provide Feedback</span>
          </div>
          <div id="feedback-history" class="feedback-history"></div>
          <div class="question-actions">
            <textarea id="feedback-input" class="answer-input" placeholder="What should change before we merge?" rows="3"></textarea>
            <div class="question-buttons">
              <button id="btn-submit-feedback" class="btn btn-primary">Submit</button>
              <button id="btn-cancel-feedback" class="btn btn-secondary">Cancel</button>
            </div>
          </div>
        </div>

        <!-- Epic feedback panel (decomposition feedback) -->
        <div id="epic-feedback-panel" class="question-panel feedback-panel hidden">
          <div class="question-header">
            <span class="question-label">Provide Feedback</span>
          </div>
          <div class="question-actions">
            <textarea id="epic-feedback-input" class="answer-input" placeholder="Describe what should change about the decomposition…" rows="3"></textarea>
            <div id="epic-feedback-error" class="epic-feedback-error hidden"></div>
            <div class="question-buttons">
              <button id="btn-submit-epic-feedback" class="btn btn-primary">Submit</button>
              <button id="btn-cancel-epic-feedback" class="btn btn-secondary">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="alert-toast-container" class="alert-toast-container"></div>

  <script src="/app.js"></script>
</body>
</html>
