<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>crab-studio</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>crab-studio</h1>
      <div id="connection-status" class="status-dot disconnected" title="Disconnected"></div>
    </header>

    <!-- Card strip: compact workflow cards -->
    <div id="card-strip" class="card-strip"></div>

    <!-- Welcome / empty state (shown when no workflow is expanded) -->
    <div id="welcome-area" class="welcome-area">
      <p class="welcome-text">Start a specification workflow below</p>
    </div>

    <!-- Detail area: expanded workflow view (hidden until a card is clicked) -->
    <div id="detail-area" class="workflow-window hidden">
      <!-- Status area -->
      <div id="status-area" class="status-area">
        <span class="status-label">Status:</span>
        <span id="workflow-status" class="status-badge idle">idle</span>
        <span id="current-step-label" class="current-step-label hidden"></span>
        <span class="summary-group">
          <span id="workflow-summary" class="summary-text"></span>
          <span id="workflow-step-summary" class="step-summary-text"></span>
          <span id="workflow-flavor" class="flavor-text"></span>
        </span>
      </div>

      <!-- Pipeline step indicators -->
      <div id="pipeline-steps" class="pipeline-steps hidden"></div>

      <!-- Completed step history (collapsed) -->
      <div id="step-history" class="step-history"></div>

      <!-- Output area -->
      <div id="output-area" class="output-area">
        <div id="output-log" class="output-log"></div>
      </div>

      <!-- Question panel -->
      <div id="question-panel" class="question-panel hidden">
        <div class="question-header">
          <span class="question-label">Agent Question</span>
          <span id="question-confidence" class="confidence-badge"></span>
        </div>
        <p id="question-content" class="question-content"></p>
        <div class="question-actions">
          <textarea id="answer-input" class="answer-input" placeholder="Type your answer..." rows="2"></textarea>
          <div class="question-buttons">
            <button id="btn-submit-answer" class="btn btn-primary">Submit</button>
            <button id="btn-skip-question" class="btn btn-secondary hidden">Skip</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Input area: always visible at bottom -->
    <div id="input-area" class="input-area-fixed">
      <div class="target-repo-field">
        <label for="target-repo-input" class="target-repo-label">Target Repository</label>
        <input id="target-repo-input" type="text" class="target-repo-input" placeholder="~/git" />
      </div>
      <textarea id="specification-input" class="spec-input" placeholder="Enter your feature description..." rows="3"></textarea>
      <div class="input-actions">
        <button id="btn-start" class="btn btn-primary">Start</button>
        <button id="btn-cancel" class="btn btn-danger hidden">Cancel</button>
        <button id="btn-retry" class="btn btn-secondary hidden">Retry</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
