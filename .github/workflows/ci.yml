name: CI

on:
  push:
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — fork PRs are further restricted by GitHub Actions defaults
# (no secret access, read-only token).
permissions:
  contents: read

env:
  BUN_VERSION: "1.3.11" # Pinned for stability; matches @types/bun in devDeps

jobs:
  commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check conventional commits
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          pattern='^(feat|fix|chore|docs|refactor|test|ci|perf|style|build|revert)(\(.+\))?!?: .+'
          failed=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "$pattern"; then
              echo "::error::Non-conventional commit: $msg"
              failed=1
            else
              echo "✅ $msg"
            fi
          done < <(git log --format=%s "$base".."$head")
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "All commits must follow the Conventional Commits specification:"
            echo "https://www.conventionalcommits.org"
            exit 1
          fi

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run tsc --noEmit

      - name: Lint & Format
        run: bunx biome ci .

      - name: Build client
        run: bun run build:client

      - name: Test
        run: bun test

      - name: Dependency audit
        run: bun audit --audit-level moderate
