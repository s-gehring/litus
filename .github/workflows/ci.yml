name: CI

on:
  pull_request:
    branches: [ master ]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — fork PRs are further restricted by GitHub Actions defaults
# (no secret access, read-only token).
permissions:
  contents: read

jobs:
  commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check conventional commits
        shell: bash
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          pattern='^(feat|fix|chore|docs|refactor|test|ci|perf|style|build|revert)(\(.+\))?!?: .+'
          failed=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "$pattern"; then
              echo "::error::Non-conventional commit: $msg"
              failed=1
            else
              echo "✅ $msg"
            fi
          done < <(git log --format=%s "$base".."$head")
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "All commits must follow the Conventional Commits specification:"
            echo "https://www.conventionalcommits.org"
            exit 1
          fi

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Quality gate
        uses: ./.github/actions/quality-gate

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker
        id: docker-setup
        uses: ./.github/actions/docker-setup

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: litus:ci
          build-args: BUN_VERSION=${{ steps.docker-setup.outputs.bun-version }}

      - name: Scan image
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: litus:ci
