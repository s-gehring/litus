name: CI

on:
  push:
  pull_request:
    branches: [master]

# Minimal permissions — fork PRs are further restricted by GitHub Actions defaults
# (no secret access, read-only token).
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.2.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run tsc --noEmit

      - name: Lint & Format
        run: bunx biome ci .

      - name: Test
        run: bun test

      - name: Dependency audit
        run: bun audit
