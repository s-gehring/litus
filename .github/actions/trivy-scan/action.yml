name: Trivy Scan
description: Run Trivy vulnerability scanner and upload results to GitHub Security

inputs:
  image-ref:
    description: Image reference to scan (local tag or registry digest)
    required: true
  severity:
    description: Severity levels to report
    required: false
    default: CRITICAL,HIGH

runs:
  using: composite
  steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      with:
        image-ref: ${{ inputs.image-ref }}
        format: sarif
        output: trivy-results.sarif
        severity: ${{ inputs.severity }}

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
      if: always()
      with:
        sarif_file: trivy-results.sarif
