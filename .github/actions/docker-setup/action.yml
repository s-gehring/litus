name: Docker Setup
description: Set up Docker build tools and optionally log in to a container registry

inputs:
  registry:
    description: Container registry to log in to
    required: false
    default: ghcr.io
  username:
    description: Registry username
    required: false
  password:
    description: Registry password (e.g. GITHUB_TOKEN)
    required: false

outputs:
  bun-version:
    description: Bun version read from .bun-version
    value: ${{ steps.bun-ver.outputs.version }}

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Log in to container registry
      if: inputs.username != '' && inputs.password != ''
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Read Bun version
      id: bun-ver
      run: echo "version=$(cat .bun-version)" >> "$GITHUB_OUTPUT"
      shell: bash
