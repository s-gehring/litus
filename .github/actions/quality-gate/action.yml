name: Quality Gate
description: Shared quality checks — lint, type-check, build, test, audit

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version-file: .bun-version

    - name: Install dependencies
      run: bun install --frozen-lockfile
      shell: bash

    - name: Type check
      run: bun run tsc --noEmit
      shell: bash

    - name: Lint & Format
      run: bunx biome ci .
      shell: bash

    - name: Build client
      run: bun run build:client
      shell: bash

    - name: Test
      run: bun test
      shell: bash

    - name: Dependency audit
      run: bun audit --audit-level moderate
      shell: bash
