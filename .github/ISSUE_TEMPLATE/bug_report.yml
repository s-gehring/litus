name: Bug Report
description: Report a bug in Litus
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: false
  - type: input
    id: bun-version
    attributes:
      label: Bun version
      description: Output of `bun --version`
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g., Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: false
